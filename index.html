<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Archive Center — Storage Solutions</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.5/JsBarcode.all.min.js"></script>
<style>
  :root{
    --navy:#3B2416; --accent:#00909B; --bg:#f5f6f8; --card:#ffffff;
    --border:#e1e4ea; --text:#1c2430; --muted:#6b7280; --danger:#b3261e;
  }
  *{box-sizing:border-box;}
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);margin:0;color:var(--text);}
  header{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;}
  header img{height:34px;background:#fff;border-radius:6px;padding:3px;}
  header h1{font-size:16px;margin:0;font-weight:600;}
  header span{font-size:11px;color:#c9d4e6;display:block;}
  nav{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;}
  nav button{flex:1;padding:14px 8px;border:none;background:none;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  nav button.active{color:var(--navy);border-bottom-color:var(--accent);}
  main{padding:16px;max-width:640px;margin:0 auto;padding-bottom:80px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:10px;font-weight:600;}
  input,select{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:15px;}
  button.primary{background:var(--navy);color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:600;width:100%;margin-top:14px;cursor:pointer;}
  button.secondary{background:#fff;color:var(--navy);border:1px solid var(--navy);padding:10px;border-radius:8px;font-size:14px;font-weight:600;width:100%;margin-top:8px;cursor:pointer;}
  .dims{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .box-row{border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px;position:relative;}
  .box-row button.remove{position:absolute;top:8px;right:8px;background:var(--danger);color:#fff;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px;}
  .result-item{border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;font-size:14px;}
  .result-item .loc{font-weight:700;color:var(--navy);}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#eef1f6;color:var(--navy);margin-left:6px;}
  #labelsSheet{display:none;}
  @media print{
    body *{visibility:hidden;}
    #labelsSheet, #labelsSheet *{visibility:visible;}
    #labelsSheet{display:block;position:absolute;top:0;left:0;width:100%;}
  }
  .label-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(4,1fr);gap:6mm;width:190mm;height:277mm;margin:auto;}
  .label{border:1px dashed #999;padding:3mm;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .label img{max-width:32mm;margin-bottom:2mm;}
  .label .loccode{font-size:11px;margin-top:2mm;font-weight:700;}
  .label .meta{font-size:9px;color:#444;margin-top:1mm;}
  .loading{font-size:13px;color:var(--muted);}
</style>
</head>

let clientsCache = [];

function switchTab(tab){
  document.querySelectorAll('section[id^="tab-"]').forEach(s=>s.style.display='none');
  document.getElementById('tab-'+tab).style.display='block';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="'+tab+'"]').classList.add('active');
}
document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click', ()=>switchTab(b.dataset.tab));
});

async function apiGet(action, params={}){
  const qs = new URLSearchParams({action, ...params}).toString();
  const res = await fetch(GAS_URL + "?" + qs);
  return res.json();
}
async function apiPost(action, payload){
  const res = await fetch(GAS_URL, { method:"POST", body: JSON.stringify({action, ...payload}) });
  return res.json();
}

  const list = document.getElementById('clientsList');
  try{
    clientsCache = await apiGet('getClients');
    list.innerHTML = clientsCache.map(c=>
      `<div class="result-item"><strong>${c.ClientName}</strong> <span class="badge">${c.ClientCode||''}</span><br>
       ${c.ContactPerson||''} · ${c.ContactPhone1||''} · ${c.ContactEmail1||''}<br>
       In: ${c.HandlingInPrice||0} / Out: ${c.HandlingOutPrice||0} · Storage: ${c.StoragePricePeriod||0}/${c.StoragePriceType||''}
       </div>`
    ).join('') || '<p class="loading">No clients yet.</p>';
    populateClientDropdown();
  }catch(e){ list.innerHTML = '<p class="loading">Could not load clients. Check GAS_URL.</p>'; }
}

function populateClientDropdown(){
  const sel = document.getElementById('rClient');
  sel.innerHTML = clientsCache.map(c=>`<option>${c.ClientName}</option>`).join('');
}

async function saveClient(){
  const payload = {
    ClientName: cName.value, ClientCode: cCode.value, ContactPerson: cContact.value,
    ContactPhone1: cPhone1.value, ContactPhone2: cPhone2.value,
    ContactEmail1: cEmail1.value, ContactEmail2: cEmail2.value,
    HandlingInPrice: cHandleIn.value, HandlingOutPrice: cHandleOut.value,
    StoragePricePeriod: cStoragePrice.value, StoragePriceType: cStorageType.value,
    ContractValue: cContractValue.value, ContractPeriodType: cContractPeriod.value,
    ContractStartDate: cContractStart.value
  };
  await apiPost('saveClient', payload);
  await loadClients();
  alert('Client saved.');
}

function addBoxRow(){
  const div = document.createElement('div');
  div.className = 'box-row';
  div.innerHTML = `
    <button class="remove" onclick="this.parentElement.remove()">Remove</button>
    <label>Box name</label>
    <input placeholder="e.g. Apple" class="boxName">
    <label>Dimensions (cm)</label>
    <div class="dims">
      <input placeholder="L" class="boxL" type="number">
      <input placeholder="W" class="boxW" type="number">
      <input placeholder="H" class="boxH" type="number">
    </div>
    <label>Expiry / disposal date (optional)</label>
    <input type="date" class="boxExpiry">`;
  document.getElementById('boxRows').appendChild(div);
}
addBoxRow();

async function submitReceive(){
  const client = rClient.value;
  const rows = [...document.querySelectorAll('#boxRows .box-row')];
  const boxes = rows.map(r=>({
    boxName: r.querySelector('.boxName').value,
    lengthCm: r.querySelector('.boxL').value,
    widthCm: r.querySelector('.boxW').value,
    heightCm: r.querySelector('.boxH').value,
    expiryDate: r.querySelector('.boxExpiry').value
  })).filter(b=>b.boxName);

  if(boxes.length===0){ alert('Enter at least one box name.'); return; }

  const result = await apiPost('receiveBoxes', {client, boxes});
  if(result.error){ alert('Error: '+result.error); return; }
  printLabels(result.assigned);
}

function printLabels(assigned){
  const grid = document.getElementById('labelGrid');
  grid.innerHTML = '';
  assigned.forEach(item=>{
    const cell = document.createElement('div');
    cell.className='label';
    const svgId = 'bc-'+Math.random().toString(36).slice(2);
    cell.innerHTML = `
      <img src="${LOGO_DATA_URI}">
      <svg id="${svgId}"></svg>
      <div class="loccode">${item.location}</div>
      <div class="meta">${item.client} — ${item.boxName}<br>${new Date().toLocaleDateString()}</div>`;
    grid.appendChild(cell);
  });
  assigned.forEach((item, i)=>{
    const svgs = grid.querySelectorAll('svg');
    JsBarcode(svgs[i], item.location, {format:"CODE128", displayValue:false, height:40, width:1.4, margin:0});
  });
  document.getElementById('labelsSheet').style.display='block';
  window.print();
  document.getElementById('labelsSheet').style.display='none';
}

async function runIssueSearch(){
  const q = issueSearch.value;
  const rows = await apiGet('search', {q});
  const div = document.getElementById('issueResults');
  if(rows.length===0){ div.innerHTML = '<p class="loading">No matches.</p>'; return; }
  div.innerHTML = rows.map(r=>`
    <div class="result-item">
      <span class="loc">${r.Location}</span> <span class="badge">${r.Status}</span><br>
      ${r.Customer||''} — ${r.CODE||''}<br>
      <label>Issue type</label>
      <select id="type-${r._row}"><option>Temporary</option><option>Permanent</option></select>
      <label>Return date (if temporary)</label>
      <input type="date" id="ret-${r._row}">
      <button class="secondary" onclick="confirmIssue('${r.Location}', ${r._row})">Confirm issue</button>
    </div>`).join('');
}

async function confirmIssue(location, rowId){
  const issueType = document.getElementById('type-'+rowId).value;
  const returnDate = document.getElementById('ret-'+rowId).value;
  const result = await apiPost('issueBox', {location, issueType, returnDate});
  if(result.error){ alert('Error: '+result.error); return; }
  alert('Issued.');
  runIssueSearch();
}

async function runGeneralSearch(){
  const q = genSearch.value;
  const rows = await apiGet('search', {q});
  renderGenResults(rows);
}
async function loadOnLoan(){
  const rows = await apiGet('getOnLoan');
  renderGenResults(rows);
}
function renderGenResults(rows){
  const div = document.getElementById('genResults');
  if(rows.length===0){ div.innerHTML = '<p class="loading">No matches.</p>'; return; }
  div.innerHTML = rows.map(r=>`
    <div class="result-item">
      <span class="loc">${r.Location}</span>
      <span class="badge">${r.Status}${r.IssueType?' — '+r.IssueType:''}</span><br>
      ${r.Customer||''} — ${r.CODE||''}<br>
      ${r["Delivery date"]? 'Received: '+r["Delivery date"] : ''} ${r.ReturnDate? '· Return due: '+r.ReturnDate : ''} ${r.ExpiryDate? '· Expiry: '+r.ExpiryDate : ''}
    </div>`).join('');
}

loadClients();

async function loadRequests(){
  const div = document.getElementById('requestsList');
  const rows = await apiGet('getPendingRequests');
  if(rows.length===0){ div.innerHTML = '<p class="loading">No pending requests.</p>'; return; }
  div.innerHTML = rows.map(r=>`
    <div class="result-item">
      <strong>${r.ClientName}</strong> (${r.ClientCode})<br>
      Box: ${r.BoxName}<br>
      <button class="secondary" onclick="jumpToIssue('${r.Location}', ${r._row})">Go to issue this box</button>
    </div>`).join('');
}

async function jumpToIssue(location, requestRow){
  switchTab('issue');
  document.getElementById('issueSearch').value = location;
  await runIssueSearch();
  await apiPost('markRequestIssued', {row: requestRow});
}

document.querySelector('.tab-btn[data-tab="requests"]').addEventListener('click', loadRequests);
</script>
</body>
</html>
